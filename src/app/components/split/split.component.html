<mat-card class="mb-4 shadow-sm border-0">
	<mat-card-header>
		<mat-card-title class="text-primary mb-3">Per Person Cost</mat-card-title>
	</mat-card-header>
	<mat-card-content>
		<button mat-flat-button color="primary" class="mb-3" (click)="split()">Split Bill</button>
		@if (splits) {
			<div class="table-responsive">
				<table class="table table-hover mt-2">
					<thead class="table-light">
						<tr>
							<th>Person</th>
							<th>Cost</th>
						</tr>
					</thead>
					<tbody>
						@for (person of persons(); track person) {
							<tr>
								<td class="fw-medium">{{ person }}</td>
								<td>${{ splits[person] | number:'1.2-2' }}</td>
							</tr>
						}
					</tbody>
				</table>
			</div>
		}
	</mat-card-content>
</mat-card>
